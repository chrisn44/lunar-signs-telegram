version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: lunar
      POSTGRES_PASSWORD: lunar
      POSTGRES_DB: lunar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  bot:
    build: .
    depends_on:
      - db
      - redis
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://lunar:lunar@db:5432/lunar
      REDIS_URL: redis://redis:6379/0
      ADMIN_IDS: ${ADMIN_IDS}
    volumes:
      - .:/app

volumes:
  pgdata: